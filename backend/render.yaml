services:
  - type: web
    name: shielding-the-shelf-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shielding-the-shelf-db
          property: connectionString

databases:
  - name: shielding-the-shelf-db
    plan: free
